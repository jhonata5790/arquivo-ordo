<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossiê — Arquivo Público</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <main id="agentPage" class="sheet-page">
    <div id="fxLayer" class="fx-layer"></div>

    <header class="sheet-header">
      <div>
        <p id="agentStatus" class="tag">Carregando registro...</p>
        <h1 id="agentName">Agente</h1>
        <p id="agentDesc">Recuperando arquivo visual.</p>
      </div>

      <a class="back-link" href="agentes.html">Voltar</a>
    </header>

    <section id="banner" class="banner">
      <span id="bannerLabel">Arquivo liberado</span>
      <strong id="bannerTitle">Registro público</strong>
      <p id="bannerText">Dossiê autorizado para leitura.</p>
    </section>

    <section class="sheet-layout">
      <section class="character-panel">
        <div class="character-aura"></div>
        <img id="agentImage" class="agent-render" src="" alt="Render do agente" />
        <div class="nameplate">
          <span id="agentCodename">REGISTRO</span>
          <strong>LIBERADO</strong>
        </div>
      </section>

      <aside class="stats-panel">
        <div class="attribute-wheel">
          <img class="wheel-img wheel-outer" alt="" />
          <img class="wheel-img wheel-inner" alt="" />
          <img class="wheel-img wheel-core" alt="" />

          <button class="attr-node node-for" data-attr="FOR"><img alt="" /><span>FOR</span><strong>0</strong></button>
          <button class="attr-node node-agi" data-attr="AGI"><img alt="" /><span>AGI</span><strong>0</strong></button>
          <button class="attr-node node-int" data-attr="INT"><img alt="" /><span>INT</span><strong>0</strong></button>
          <button class="attr-node node-pre" data-attr="PRE"><img alt="" /><span>PRE</span><strong>0</strong></button>
          <button class="attr-node node-vig" data-attr="VIG"><img alt="" /><span>VIG</span><strong>0</strong></button>
        </div>

        <section class="info-grid">
          <article><span>Classe</span><strong id="agentClass">---</strong></article>
          <article><span>Origem</span><strong id="agentOrigin">---</strong></article>
          <article><span>NEX</span><strong id="agentNex">---</strong></article>
          <article><span>Patente</span><strong id="agentRank">---</strong></article>
        </section>

        <section id="attributeInsight" class="insight">
          <span id="insightName">Atributo selecionado</span>
          <strong id="insightValue">--</strong>
          <p id="insightText">Clique em um atributo para abrir a leitura operacional.</p>
        </section>
      </aside>

      <section class="folder-system">
        <nav class="folder-tabs">
          <button data-folder="descricao">Dossiê</button>
          <button data-folder="habilidades">Competências</button>
          <button data-folder="trilha">Atuação</button>
          <button data-folder="rituais">Paranormal</button>
          <button data-folder="pericias">Áreas</button>
          <button data-folder="inventario">Equipamentos</button>
          <button data-folder="relacoes">Vínculos</button>
          <button data-folder="ordo">Avaliação</button>
        </nav>

        <article class="folder-content">
          <p class="tag">ARQUIVO ABERTO</p>
          <h2 id="folderTitle">Dossiê</h2>
          <div id="folderBody" class="folder-body"></div>
        </article>
      </section>
    </section>
  </main>

  <script src="../script.js"></script>
</body>
</html>
